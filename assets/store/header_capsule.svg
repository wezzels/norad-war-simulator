<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 616 353">
  <!-- Background -->
  <rect width="616" height="353" fill="#0a0a14"/>
  
  <!-- Globe -->
  <circle cx="308" cy="176" r="140" fill="#1a2a3a" stroke="#3a6a8a" stroke-width="6"/>
  
  <!-- Continents -->
  <ellipse cx="240" cy="130" rx="40" ry="28" fill="#2a4a3a" opacity="0.7"/>
  <ellipse cx="360" cy="140" rx="35" ry="42" fill="#2a4a3a" opacity="0.7"/>
  <ellipse cx="300" cy="220" rx="28" ry="35" fill="#2a4a3a" opacity="0.7"/>
  
  <!-- Grid lines -->
  <ellipse cx="308" cy="176" rx="140" ry="140" fill="none" stroke="#3a5a7a" stroke-width="1" opacity="0.5"/>
  <line x1="168" y1="176" x2="448" y2="176" stroke="#3a5a7a" stroke-width="1" opacity="0.5"/>
  <line x1="308" y1="36" x2="308" y2="316" stroke="#3a5a7a" stroke-width="1" opacity="0.5"/>
  
  <!-- Missile trajectory -->
  <path d="M80 280 Q180 120 420 100" fill="none" stroke="#ff6b6b" stroke-width="3" stroke-dasharray="8,4"/>
  
  <!-- Interceptor -->
  <path d="M340 220 Q260 180 160 160" fill="none" stroke="#4ecdc4" stroke-width="2"/>
  <circle cx="160" cy="160" r="5" fill="#4ecdc4"/>
  
  <!-- Explosion marker -->
  <circle cx="420" cy="100" r="6" fill="#ffd93d" stroke="#ff6b6b" stroke-width="2"/>
  
  <!-- Title -->
  <text x="308" y="40" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">NORAD WAR SIMULATOR</text>
  <text x="308" y="340" fill="#4a6a8a" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Strategic Defense Command</text>
</svg>