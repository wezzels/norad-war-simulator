<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 112">
  <!-- Background -->
  <rect width="200" height="112" fill="#0a0a14"/>
  
  <!-- Small globe -->
  <circle cx="50" cy="56" r="40" fill="#1a2a3a" stroke="#3a6a8a" stroke-width="2"/>
  <ellipse cx="50" cy="56" rx="40" ry="40" fill="none" stroke="#3a5a7a" stroke-width="1" opacity="0.5"/>
  
  <!-- Missile path -->
  <path d="M20 85 Q40 35 85 40" fill="none" stroke="#ff6b6b" stroke-width="2"/>
  
  <!-- Title -->
  <text x="130" y="50" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">NORAD</text>
  <text x="130" y="65" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">WAR SIM</text>
  
  <!-- DEFCON -->
  <rect x="100" y="80" width="60" height="16" rx="2" fill="#2a2a3a" stroke="#ff6b6b" stroke-width="1"/>
  <text x="130" y="92" fill="#ff6b6b" font-family="monospace" font-size="8" text-anchor="middle">DEFCON 3</text>
</svg>