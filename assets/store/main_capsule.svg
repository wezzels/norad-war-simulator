<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 215">
  <!-- Background -->
  <rect width="460" height="215" fill="#0a0a14"/>
  
  <!-- Globe -->
  <circle cx="180" cy="108" r="85" fill="#1a2a3a" stroke="#3a6a8a" stroke-width="4"/>
  
  <!-- Grid lines -->
  <ellipse cx="180" cy="108" rx="85" ry="85" fill="none" stroke="#3a5a7a" stroke-width="1" opacity="0.5"/>
  <line x1="95" y1="108" x2="265" y2="108" stroke="#3a5a7a" stroke-width="1" opacity="0.5"/>
  
  <!-- Missile -->
  <path d="M50 170 Q100 80 270 90" fill="none" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="4,2"/>
  <circle cx="50" cy="170" r="4" fill="#ff6b6b"/>
  
  <!-- Interceptor -->
  <path d="M220 130 Q170 110 100 100" fill="none" stroke="#4ecdc4" stroke-width="2"/>
  <circle cx="100" cy="100" r="3" fill="#4ecdc4"/>
  
  <!-- Title -->
  <text x="340" y="80" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">NORAD</text>
  <text x="340" y="100" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">WAR</text>
  <text x="340" y="120" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">SIMULATOR</text>
  
  <!-- Subtitle -->
  <text x="340" y="145" fill="#4a6a8a" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Strategic Defense</text>
  <text x="340" y="158" fill="#4a6a8a" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Command</text>
  
  <!-- DEFCON -->
  <rect x="310" y="175" width="60" height="18" rx="3" fill="#2a2a3a" stroke="#ff6b6b" stroke-width="1"/>
  <text x="340" y="188" fill="#ff6b6b" font-family="monospace" font-size="10" text-anchor="middle">DEFCON 3</text>
</svg>